server:
  port: ${PORT:8081}
  tomcat:
    threads:
      max: 25

spring:
  main:
    allow-bean-definition-overriding: true
  profiles:
    default: local
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE:4}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUMIDLE:0}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLETIMEOUT:60000}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTIONTIMEOUT:30000}
      max-lifetime: 120000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: "${JWT_SECRET:troque-esta-chave-super-secreta-de-32-caracteres-ou-mais}"
    expiresInSeconds: ${JWT_TTL:86400}
  cors:
    allowed-origins: "${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}"

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    metrics:
      enabled: true
  metrics:
    tags:
      application: sua-app


